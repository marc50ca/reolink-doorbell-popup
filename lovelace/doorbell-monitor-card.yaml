# ============================================================
# Front Door Monitor — Lovelace Card
#
# Paste into your dashboard via:
#   Edit Dashboard → + Add Card → Manual Card → paste YAML
# ============================================================

type: vertical-stack
cards:

  - type: markdown
    content: >
      ## 📷 Front Door
      **Doorbell:** {% if is_state('binary_sensor.front_door_visitor', 'on') %}
        🔔 **Visitor!**
      {% else %}
        ✅ All clear
      {% endif %}

  - type: picture-entity
    entity: camera.front_door_fluent
    camera_view: live
    show_name: false
    show_state: false

  - type: horizontal-stack
    cards:
      - type: button
        name: Open Door
        icon: mdi:door-open
        tap_action:
          action: call-service
          service: script.open_the_door

      - type: button
        name: Full Screen
        icon: mdi:fullscreen
        tap_action:
          action: more-info
          entity: camera.front_door_fluent

  - type: history-graph
    title: Visitor Activity (24 h)
    entities:
      - entity: binary_sensor.front_door_visitor
        name: Doorbell presses
    hours_to_show: 24
    refresh_interval: 30
